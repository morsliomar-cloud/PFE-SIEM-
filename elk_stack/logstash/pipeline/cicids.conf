input {
  file {
    # C'est ici que Logstash ira chercher votre fichier dans le conteneur Docker
    path => "/usr/share/logstash/data/attaques.csv"
    start_position => "beginning"
    sincedb_path => "/dev/null" # Force Logstash à tout relire (pratique pour vos tests)
  }
}

filter {
  csv {
    separator => ","
    # Voici toutes les colonnes que nous avons identifiées tout à l'heure
   columns => ["Destination Port", "Flow Duration", "Total Fwd Packets", "Total Backward Packets", "Total Length of Fwd Packets", "Total Length of Bwd Packets", "Fwd Packet Length Max", "Fwd Packet Length Min", "Fwd Packet Length Mean", "Fwd Packet Length Std", "Bwd Packet Length Max", "Bwd Packet Length Min", "Bwd Packet Length Mean", "Bwd Packet Length Std", "Flow Bytes/s", "Flow Packets/s", "Flow IAT Mean", "Flow IAT Std", "Flow IAT Max", "Flow IAT Min", "Fwd IAT Total", "Fwd IAT Mean", "Fwd IAT Std", "Fwd IAT Max", "Fwd IAT Min", "Bwd IAT Total", "Bwd IAT Mean", "Bwd IAT Std", "Bwd IAT Max", "Bwd IAT Min", "Fwd PSH Flags", "Bwd PSH Flags", "Fwd URG Flags", "Bwd URG Flags", "Fwd Header Length", "Bwd Header Length", "Fwd Packets/s", "Bwd Packets/s", "Min Packet Length", "Max Packet Length", "Packet Length Mean", "Packet Length Std", "Packet Length Variance", "FIN Flag Count", "SYN Flag Count", "RST Flag Count", "PSH Flag Count", "ACK Flag Count", "URG Flag Count", "CWE Flag Count", "ECE Flag Count", "Down/Up Ratio", "Average Packet Size", "Avg Fwd Segment Size", "Avg Bwd Segment Size", "Fwd Header Length_1", "Fwd Avg Bytes/Bulk", "Fwd Avg Packets/Bulk", "Fwd Avg Bulk Rate", "Bwd Avg Bytes/Bulk", "Bwd Avg Packets/Bulk", "Bwd Avg Bulk Rate", "Subflow Fwd Packets", "Subflow Fwd Bytes", "Subflow Bwd Packets", "Subflow Bwd Bytes", "Init_Win_bytes_forward", "Init_Win_bytes_backward", "act_data_pkt_fwd", "min_seg_size_forward", "Active Mean", "Active Std", "Active Max", "Active Min", "Idle Mean", "Idle Std", "Idle Max", "Idle Min", "Label"]
    skip_header => "true"
  }

  # Simulation des données manquantes pour votre SIEM (ASTUCE DE PRO !)
  mutate {
    add_field => {
      "src_ip" => "192.168.1.150" # On simule une adresse IP attaquante
      "dst_ip" => "10.0.0.5"      # On simule le serveur Web victime
    }
    # On s'assure que le port est un chiffre pour faire des graphiques dans Kibana
    convert => {
      "Destination Port" => "integer"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://es01:9200"] # L'adresse de votre noeud Elasticsearch sous Docker
    index => "cicids-webattacks"  
    manage_template => false         # Le nom de l'index dans lequel les données vont atterrir
  }
  
  # Affiche les logs dans le terminal Docker pour vérifier que ça marche
  stdout { codec => rubydebug }
}